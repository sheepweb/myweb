<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CBoard Modern - 现代化订阅管理系统" />
    <meta name="keywords" content="订阅管理,代理服务,用户管理" />
    <meta name="author" content="CBoard Team" />
    <title>CBoard Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="theme-color" content="#1677ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CBoard">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <script>
      (function () {
        try {
          if (typeof window === 'undefined' || !window.location) return;
          var hostname = window.location.hostname || '';
          if (hostname && /\.+$/.test(hostname)) {
            var fixedHostname = hostname.replace(/\.+$/, '');
            var port = window.location.port ? (':' + window.location.port) : '';
            var newUrl = window.location.protocol + '//' + fixedHostname + port +
              window.location.pathname + window.location.search + window.location.hash;
            window.location.replace(newUrl);
          }
        } catch (e) {
        }
      })();
    </script>
    <style>
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .loading-content {
        text-align: center;
        color: white;
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 10px;
      }
      .loading-subtitle {
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">CBoard Modern</div>
        <div class="loading-subtitle">正在加载...</div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function() {
        try {
          const adminToken = localStorage.getItem('cboard_secure_admin_token');
          const userToken = sessionStorage.getItem('cboard_secure_user_token');
          if (adminToken) {
            try {
              const data = JSON.parse(adminToken);
              if (data.expiry && Date.now() > data.expiry) {
                const keys = ['admin_token', 'admin_user', 'admin_refresh_token', 
                             'user_token', 'user_data', 'user_refresh_token',
                             'token', 'refresh_token', 'user'];
                keys.forEach(key => {
                  localStorage.removeItem('cboard_secure_' + key);
                  sessionStorage.removeItem('cboard_secure_' + key);
                });
              }
            } catch (e) {
              localStorage.removeItem('cboard_secure_admin_token');
            }
          }
        } catch (e) {
        }
      })();
    </script>
    <script>
      function hideLoading() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 300);
        }
      }
      if (document.readyState === 'complete') {
        setTimeout(hideLoading, 100);
      } else {
        window.addEventListener('load', function() {
          setTimeout(hideLoading, 100);
        });
      }
      setTimeout(hideLoading, 2000);
    </script>
  </body>
</html>
